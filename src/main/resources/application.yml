spring:
  application:
    name: personal-data-ai

auth:
  api-key: ${AUTH_API_KEY}

notion:
  api-key: ${NOTION_API_KEY}
  # legacy
  timetable-database-id: ${NOTION_TIMETABLE_DATABASE_ID}
  til-database-id: ${NOTION_TIL_DATABASE_ID}
  condition-database-id: ${NOTION_CONDITION_DATABASE_ID}
  nutrition-database-id: ${NOTION_NUTRITION_DATABASE_ID}
  food-database-id: ${NOTION_FOOD_DATABASE_ID}
  version: ${NOTION_VERSION:2022-06-28}
  title-property: ${NOTION_TITLE_PROPERTY:Name}
  date-property: ${NOTION_DATE_PROPERTY:날짜}
  day-time-zone: ${NOTION_DAY_TIME_ZONE:Asia/Seoul}

reminder:
  allowed-categories: ${REMINDER_ALLOWED_CATEGORIES}

gemini:
  api-key: ${GEMINI_API_KEY}
  model: ${GEMINI_MODEL:gemini-3.1-flash-lite-preview}
  api-version: ${GEMINI_API_VERSION:v1beta}
