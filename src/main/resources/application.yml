spring:
  application:
    name: personal-data-ai

auth:
  api-key: ${AUTH_API_KEY}

notion:
  api-key: ${NOTION_API_KEY}
  database-id: ${NOTION_DATABASE_ID}
  version: ${NOTION_VERSION:2022-06-28}
  title-property: ${NOTION_TITLE_PROPERTY:Name}
  day-time-zone: ${NOTION_DAY_TIME_ZONE:Asia/Seoul}

reminder:
  allowed-categories: ${REMINDER_ALLOWED_CATEGORIES}
